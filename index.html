<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky77 Premium Wheel</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="bgLayer" class="bg-layer"></div>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-logo">LUCKY77</div>
        <div class="brand-sub">Premium Wheel Panel</div>
      </div>

      <div class="topbar-actions">
        <button id="musicBtn" class="btn soft" type="button">🎵 Music OFF</button>
        <button id="settingsBtn" class="btn icon" type="button">⚙️</button>
      </div>
    </header>

    <section class="hero-banner banner-box">
      <img id="topBannerImg" alt="Top Banner" style="display:none" />
      <div id="topBannerFallback" class="banner-fallback">
        Top Banner
      </div>
    </section>

    <main class="main-grid">
      <section class="left-menu glass-card">
        <div class="menu-title">Lucky77 Control</div>
        <button class="menu-item active" type="button">Dashboard</button>
        <button class="menu-item" type="button" id="membersBtn">Members</button>
        <button class="menu-item" type="button" id="winnersBtn">Winners</button>
        <button class="menu-item" type="button" id="historyBtn">History</button>
      </section>

      <section class="center-panel">
        <div class="stats-row">
          <div class="stat-card glass-card">
            <div class="stat-label">Pool Count</div>
            <div class="stat-value" id="poolText">-</div>
          </div>

          <div class="stat-card glass-card">
            <div class="stat-label">Members</div>
            <div class="stat-value" id="membersStatText">-</div>
          </div>

          <div class="stat-card glass-card">
            <div class="stat-label">Winners</div>
            <div class="stat-value" id="winnersStatText">-</div>
          </div>

          <div class="stat-card glass-card">
            <div class="stat-label">Test Mode</div>
            <label class="toggle">
              <input type="checkbox" id="testModeInput" />
              <span class="toggle-ui"></span>
            </label>
          </div>
        </div>

        <div class="wheel-layout">
          <div class="builder-card glass-card">
            <div class="section-title">Prize Builder</div>
            <div id="prizeBuilder" class="prize-builder"></div>
          </div>

          <div class="wheel-card glass-card">
            <div class="wheel-wrap" id="wheelWrap">
              <div class="wheel-arrow" id="wheelArrow"></div>
              <canvas id="wheel" width="520" height="520"></canvas>
              <button id="spinBtn" class="spin-btn" type="button">SPIN</button>
            </div>

            <div class="wheel-banner-box">
              <div class="wheel-banner-slab"></div>
              <img id="wheelBannerImg" alt="Wheel Banner" style="display:none" />
              <div id="wheelBannerFallback" class="wheel-banner-fallback">
                <div>Lucky77</div>
                <div>Lucky Wheel</div>
              </div>
            </div>

            <div class="wheel-actions">
              <button id="restartSpinBtn" class="btn danger" type="button">Restart Spin</button>
              <div id="statusText" class="status-text">Ready</div>
            </div>
          </div>
        </div>

        <section id="membersPanel" class="panel glass-card hidden">
          <div class="panel-head">
            <div class="panel-title">Members <span id="membersTotalText"></span></div>
            <button id="membersCloseBtn" class="btn mini" type="button">Close</button>
          </div>
          <div id="membersTable" class="panel-body"></div>
        </section>

        <section id="winnersPanel" class="panel glass-card hidden">
          <div class="panel-head">
            <div class="panel-title">Winners <span id="winnersTotalText"></span></div>
            <button id="winnersCloseBtn" class="btn mini" type="button">Close</button>
          </div>
          <div id="winnersList" class="panel-body"></div>
        </section>

        <section id="historyPanel" class="panel glass-card hidden">
          <div class="panel-head">
            <div class="panel-title">History <span id="historyTotalText"></span></div>
            <button id="historyCloseBtn" class="btn mini" type="button">Close</button>
          </div>
          <div id="historyList" class="panel-body"></div>
        </section>
      </section>
    </main>

    <section class="footer-banner banner-box">
      <img id="bottomBannerImg" alt="Bottom Banner" style="display:none" />
      <div id="bottomBannerFallback" class="banner-fallback">
        Bottom Banner
      </div>
    </section>
  </div>

  <div id="winnerModal" class="modal hidden" aria-hidden="true">
    <div id="winnerBackdrop" class="modal-backdrop"></div>

    <div class="modal-card">
      <div class="modal-head">
        <div id="winnerPrizeTitle" class="modal-badge">WINNER</div>
        <button id="winnerCloseBtn" class="btn mini" type="button">Close</button>
      </div>

      <div id="winnerTitleText" class="modal-prize">-</div>
      <div id="winnerNameText" class="modal-name">-</div>
      <div id="winnerHint" class="modal-hint">-</div>

      <div class="modal-actions">
        <button id="contactBtn" class="btn primary" type="button">Telegram</button>
        <button id="noticeBtn" class="btn" type="button">Notice DM</button>
      </div>
    </div>
  </div>

  <aside id="drawer" class="drawer">
    <div class="drawer-head">
      <div class="drawer-title">Settings</div>
      <button id="closeSettingsBtn" class="btn icon" type="button">✕</button>
    </div>

    <div class="field">
      <label for="apiBaseInput">Render API Base</label>
      <input id="apiBaseInput" type="text" />
    </div>

    <div class="field">
      <label for="apiKeyInput">API Key</label>
      <input id="apiKeyInput" type="text" />
    </div>

    <div class="field">
      <label for="uiColorInput">UI Color</label>
      <input id="uiColorInput" type="color" />
    </div>

    <div class="field">
      <label for="wheelAccentInput">Wheel Accent</label>
      <input id="wheelAccentInput" type="color" />
    </div>

    <div class="field">
      <label for="wheelColorsInput">Slice Colors (one per line)</label>
      <textarea id="wheelColorsInput" rows="5"></textarea>
    </div>

    <div class="field">
      <label for="pageBgFile">Page Background</label>
      <input id="pageBgFile" type="file" accept="image/*" />
    </div>

    <div class="field">
      <label for="wheelBgFile">Wheel Border Background</label>
      <input id="wheelBgFile" type="file" accept="image/*" />
    </div>

    <div class="field">
      <label for="topBannerFile">Top Banner</label>
      <input id="topBannerFile" type="file" accept="image/*" />
    </div>

    <div class="field">
      <label for="bottomBannerFile">Bottom Banner</label>
      <input id="bottomBannerFile" type="file" accept="image/*" />
    </div>

    <div class="field">
      <label for="wheelBannerFile">Wheel Banner PNG</label>
      <input id="wheelBannerFile" type="file" accept="image/*" />
    </div>

    <div class="field">
      <label for="bgSongFile">Background Music</label>
      <input id="bgSongFile" type="file" accept="audio/*" />
    </div>

    <div class="drawer-actions">
      <button id="resetBtn" class="btn" type="button">Reset</button>
      <button id="saveBtn" class="btn primary" type="button">Save</button>
    </div>
  </aside>

  <script src="./script.js"></script>
</body>
</html>
