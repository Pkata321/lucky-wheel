<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky Spin Wheel</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="bg" id="bgLayer"></div>

  <div class="page">

    <!-- ================= TOP BAR ================= -->
    <div class="topbar">
      <div class="brand">
        <h1>🎡 Lucky Spin Wheel</h1>
        <p>Luxury • Prize Turn • Member No-Repeat • Telegram Contact</p>
      </div>

      <div class="top-actions">
        <button class="btn icon" id="settingsBtn" title="Settings">⚙️</button>
        <button class="btn" id="musicBtn">🎵 Music: OFF</button>
      </div>
    </div>

    <!-- ================= TOP BANNER ================= -->
    <div class="banner-img">
      <img id="topBannerImg" style="display:none" />
      <div id="topBannerFallback" class="banner-fallback">
        Top Banner (Settings မှ Upload လုပ်နိုင်ပါတယ်)
      </div>
    </div>

    <!-- ================= MAIN ================= -->
    <div class="main">

      <div class="wheel-card">

        <!-- ================= WHEEL AREA ================= -->
        <div class="wheel-wrap" id="wheelWrap">

          <!-- POINTER (TOP) -->
          <div class="pointer"></div>

          <!-- CANVAS -->
          <canvas id="wheel" width="520" height="520"></canvas>

          <!-- SPIN BUTTON -->
          <button id="spinBtn" class="spin-btn">SPIN</button>

        </div>

        <!-- ================= ✅ WHEEL BRAND PNG BANNER ================= -->
        <!-- brand.png ကို html ဖိုင်နဲ့တူတဲ့ folder ထဲထည့်ပါ -->
        <div class="wheel-brand-banner">
          <img src="./brand.png" alt="Lucky77 Brand">
        </div>

        <!-- ================= POOL ================= -->
        <div class="info-row">
          <div class="label">POOL</div>
          <div id="poolText">-</div>
        </div>

        <!-- ================= ACTION BUTTONS ================= -->
        <div class="actions">
          <button class="btn" id="restartSpinBtn">Restart Spin</button>
          <button class="btn" id="membersBtn">Members</button>
          <button class="btn" id="historyBtn">Winner History</button>
        </div>

        <!-- ================= MEMBERS PANEL ================= -->
        <div id="membersPanel" class="panel hidden">
          <div class="panel-head">
            <div class="panel-title">
              Telegram Member List
              <span class="panel-total" id="membersTotalText"></span>
            </div>
            <button class="btn mini" id="membersCloseBtn">Close</button>
          </div>
          <div class="panel-body" id="membersTable"></div>
        </div>

        <!-- ================= HISTORY PANEL ================= -->
        <div id="historyPanel" class="panel hidden">
          <div class="panel-head">
            <div class="panel-title">Winner History</div>
            <button class="btn mini" id="historyCloseBtn">Close</button>
          </div>
          <div class="panel-body" id="historyList"></div>
        </div>

      </div>
    </div>

    <!-- ================= BOTTOM BANNER ================= -->
    <div class="banner-img">
      <img id="bottomBannerImg" style="display:none" />
      <div id="bottomBannerFallback" class="banner-fallback">
        Bottom Banner (Settings မှ Upload လုပ်နိုင်ပါတယ်)
      </div>
    </div>

  </div>

  <!-- ================= WINNER MODAL ================= -->
  <div id="winnerModal" class="modal hidden">
    <div class="modal-backdrop" id="winnerBackdrop"></div>
    <div class="modal-card">

      <div class="modal-head">
        <div class="modal-badge" id="winnerPrizeTitle">WINNER</div>
        <button class="btn mini" id="winnerCloseBtn">Close</button>
      </div>

      <div class="modal-title" id="winnerTitleText">—</div>
      <div class="modal-name" id="winnerNameText">—</div>

      <div class="modal-actions">
        <button class="btn primary" id="contactBtn">Telegram</button>
        <button class="btn" id="noticeBtn">Notice (DM)</button>
      </div>

      <div class="small" id="winnerHint" style="margin-top:10px"></div>

      <div class="fx">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>

    </div>
  </div>

  <!-- ================= SETTINGS DRAWER ================= -->
  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <h2>⚙️ Settings</h2>
      <button class="btn icon" id="closeSettingsBtn">✖️</button>
    </div>

    <div class="field">
      <label>Render API</label>
      <input id="apiBaseInput" type="text" />
    </div>

    <div class="field">
      <label>API Key</label>
      <input id="apiKeyInput" type="text" />
    </div>

    <div class="field">
      <label>Prize List + Turn</label>
      <div id="prizeBuilder"></div>
    </div>

    <div class="field">
      <label>UI Color</label>
      <input id="uiColorInput" type="color" value="#ffffff" />
    </div>

    <div class="field">
      <label>Spin Accent</label>
      <input id="wheelAccentInput" type="color" value="#d6b25e" />
    </div>

    <div class="drawer-actions">
      <button class="btn" id="resetBtn">Reset</button>
      <button class="btn primary" id="saveBtn">Save</button>
    </div>
  </div>

  <script src="./script.js"></script>

</body>
</html>
